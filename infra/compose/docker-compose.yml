# Local big-data stack. Bring up only what you need:
#   docker compose up -d api                  # just the app (uses the artifact)
#   docker compose --profile lake up -d       # + Spark, Hive Metastore, MinIO
#   docker compose --profile stream up -d     # + Kafka (SmartAPI tick pipeline)
name: fundxray

services:
  api:
    build: { context: ../.., dockerfile: infra/docker/api.Dockerfile }
    command: uvicorn serving.api.main:app --host 0.0.0.0 --port 8000
    env_file: [ ../../.env ]
    environment:
      PYTHONPATH: /app:/app/core
    ports: [ "8000:8000" ]
    volumes: [ ../..:/app ]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fundxray
      POSTGRES_PASSWORD: fundxray
      POSTGRES_DB: fundxray
    ports: [ "5432:5432" ]
    volumes: [ pgdata:/var/lib/postgresql/data ]

  minio:
    profiles: [ lake ]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: [ "9000:9000", "9001:9001" ]
    volumes: [ miniodata:/data ]

  hive-metastore:
    profiles: [ lake ]
    image: apache/hive:4.0.0
    environment:
      SERVICE_NAME: metastore
    ports: [ "9083:9083" ]
    depends_on: [ postgres ]

  spark-master:
    profiles: [ lake ]
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    ports: [ "7077:7077", "8080:8080" ]
    volumes: [ ../..:/app ]

  spark-worker:
    profiles: [ lake ]
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
    depends_on: [ spark-master ]
    volumes: [ ../..:/app ]

  kafka:
    profiles: [ stream ]
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: [ "9092:9092" ]

volumes:
  pgdata:
  miniodata:
